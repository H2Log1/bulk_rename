name: Smart Auto Release (Windows Only)

on:
  push:
    branches: [main]

permissions:
  contents: write # 明确声明需要写权限

env:
  APP_NAME: bulk_rename

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      exists: ${{ steps.tag_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: get_version
        run: |
          # 2026 年更推荐用这个方式提取版本号，避免空格干扰
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      - id: tag_check
        run: |
          git fetch --tags
          if git rev-parse "refs/tags/v$(grep '^version' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.exists == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/release/${{ env.APP_NAME }}.exe" -Destination "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "${{ env.APP_NAME }}-${{ needs.check-version.outputs.version }}-windows.zip"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          files: |
            dist/${{ env.APP_NAME }}.exe
            *.zip
          generate_release_notes: true