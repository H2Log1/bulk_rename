name: Smart Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  APP_NAME: bulk_rename

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: check-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/${{ env.APP_NAME }}.exe dist/
            cd dist && 7z a ../${{ env.APP_NAME }}-${{ matrix.artifact }}.zip *
          else
            cp target/${{ matrix.target }}/release/${{ env.APP_NAME }} dist/
            cd dist && tar -czf ../${{ env.APP_NAME }}-${{ matrix.artifact }}.tar.gz *
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: ${{ env.APP_NAME }}-${{ matrix.artifact }}.*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          files: assets/*
          generate_release_notes: true
          make_latest: true