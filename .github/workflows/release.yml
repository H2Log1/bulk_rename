name: Smart Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write # 必须，用于创建 Release 和 Tag

env:
  APP_NAME: bulk_rename

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      exists: ${{ steps.tag_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v5 # 升级到 v5
      - id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      - id: tag_check
        run: |
          git fetch --tags
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.exists == 'false'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      
      # 使用现代化的 Rust 缓存方案
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/${{ env.APP_NAME }}.exe dist/
            cd dist && 7z a ../${{ env.APP_NAME }}-${{ matrix.artifact }}.zip *
          else
            cp target/${{ matrix.target }}/release/${{ env.APP_NAME }} dist/
            cd dist && tar -czf ../${{ env.APP_NAME }}-${{ matrix.artifact }}.tar.gz *
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: ${{ env.APP_NAME }}-${{ matrix.artifact }}.*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 通过 API 创建 Release，只要 Bypass List 配置正确，即可自动生成 Tag
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          files: assets/*
          generate_release_notes: true